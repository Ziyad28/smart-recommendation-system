<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Recommendation</title>

    <style>
        *{
          box-sizing:border-box;
          margin:0;
          padding:0;
          font-family:Arial;
        }

        body{
          background:#f5f5f5;
          min-height:100vh;
          display:flex;
          justify-content:center;
          align-items:flex-start;
          padding:40px;
        }

        .container{
          width:900px;
          background:white;
          padding:30px;
          border-radius:20px;
          box-shadow:0 10px 30px gray;
        }

        h2{
          text-align:center;
          margin-bottom:25px;
        }

        label{
          font-weight:bold;
          display:block;
          margin-top:10px;
        }

        select{
          width:100%;
          padding:12px;
          margin:10px 0 15px;
          border-radius:10px;
          border:1px solid gray;
        }

        button{
          width:100%;
          padding:14px;
          border:none;
          border-radius:12px;
          background:orange;
          color:white;
          font-weight:bold;
          cursor:pointer;
        }

        button:hover{
          background:darkorange;
        }

        #result{
          margin-top:25px;
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:15px;
        }

        .card{
          background:white;
          border-radius:16px;
          padding:15px;
          border:1px solid #ddd;
          box-shadow:0 5px 15px #ddd;
          transition:0.2s;
        }

        .card:hover{
          transform:scale(1.02);
        }

        .card img{
          width:100%;
          height:150px;
          object-fit:cover;
          border-radius:10px;
          margin-bottom:10px;
        }

        .mapBtn{
          margin-top:10px;
          background:black;
          color:white;
          border:none;
          padding:10px;
          border-radius:8px;
        }

        .star{
          color:gold;
        }

        .badge1{
          color:gold;
          font-weight:bold;
        }

        .badge2{
          color:silver;
          font-weight:bold;
        }

        .badge3{
          color:#cd7f32;
          font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Smart Recommendation System </h2>

    <label>City</label>
    <select id="city"></select>

    <label>Type</label>
    <select id="type" onchange="updateCategoryOptions()"></select>

    <label>Category</label>
    <select id="category"></select>

    <button onclick="recommend()">Find Best Places</button>

    <div id="result"></div>

</div>

<script>

    const cities=["Hail","Riyadh","Dammam"];

    const restaurantCategories=[
    "italian restaurant",
    "american restaurant",
    "japanese restaurant",
    "saudi restaurant",
    "shawarma restaurant"
    ];

    const coffeeCategories=[
    "specialty coffee",
    "roastery coffee"
    ];

    function getStars(rating){
    let stars="";
    for(let i=0;i<Math.floor(rating);i++){
    stars+="★";
    }
    return stars;
    }

    function getImage(type, category){

    if(type==="coffee"){
    return "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=600";
    }

    if(category.includes("italian")){
    return "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600";
    }

    if(category.includes("japanese")){
    return "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=600";
    }

    if(category.includes("shawarma")){
    return "https://images.unsplash.com/photo-1529006557810-274b9b2fc783?w=600";
    }

    if(category.includes("saudi")){
    return "https://images.unsplash.com/photo-1543353071-10c8ba85a904?w=600";
    }

    return "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=600";
    }

    function fillCities(){
    const citySelect=document.getElementById("city");
    cities.forEach(city=>{
    const option=document.createElement("option");
    option.value=city;
    option.textContent=city;
    citySelect.appendChild(option);
    });
    }

    function fillTypes(){
    const typeSelect=document.getElementById("type");
    ["restaurant","coffee"].forEach(t=>{
    const option=document.createElement("option");
    option.value=t;
    option.textContent=t;
    typeSelect.appendChild(option);
    });
    }

    function updateCategoryOptions(){
    const type=document.getElementById("type").value;
    const category=document.getElementById("category");
    category.innerHTML="";

    const list = type==="restaurant" ? restaurantCategories : coffeeCategories;

    list.forEach(item=>{
    const option=document.createElement("option");
    option.value=item;
    option.textContent=item;
    category.appendChild(option);
    });
    }

    function recommend(){

    const data={
      age:0,
      budget:0,
      city:document.getElementById("city").value,
      type:document.getElementById("type").value,
      category:document.getElementById("category").value,
      language:"en"
    };

    fetch("/api/recommend",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
    })
    .then(res=>res.json())
    .then(showResults)
    .catch(()=>{
    document.getElementById("result").innerHTML="Error loading data";
    });
    }

    function showResults(data){

    const container=document.getElementById("result");
    container.innerHTML="";

    const places=data.places || [];

    places.forEach((p,index)=>{

    let badge="";

    if(index===0){
    badge="<p class='badge1'>🥇 Best Match</p>";
    }

    else if(index===1){
    badge="<p class='badge2'>🥈 Second Best</p>";
    }

    else if(index===2){
    badge="<p class='badge3'>🥉 Third Best</p>";
    }

    const mapLink="https://www.google.com/maps/search/"+encodeURIComponent(p.name);

    container.innerHTML += `
    <div class="card">

    <img src="${getImage(
    document.getElementById("type").value,
    document.getElementById("category").value
    )}" />

    ${badge}

    <h3>${p.name}</h3>

    <p class="star">${getStars(p.rating)}</p>

    <p>⭐ ${p.rating} • ${p.reviews} reviews</p>

    <a href="${mapLink}" target="_blank">
    <button class="mapBtn">Open in Google Maps</button>
    </a>

    </div>
    `;

    });

    }

    fillCities();
    fillTypes();
    updateCategoryOptions();

</script>

</body>
</html>
