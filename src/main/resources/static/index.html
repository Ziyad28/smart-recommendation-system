<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Recommendation</title>

    <style>

        *{
        box-sizing:border-box;
        margin:0;
        padding:0;
        font-family: 'Segoe UI', sans-serif;
        }

        body{
        background:linear-gradient(135deg,#0f0f0f,#1a1a2e,#16213e);
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
        }

        /* MAIN CARD */

        .container{
        width:420px;
        padding:30px;
        border-radius:20px;
        background:rgba(255,255,255,0.05);
        backdrop-filter:blur(12px);
        box-shadow:0 0 25px rgba(0,0,0,0.5);
        border:1px solid rgba(255,255,255,0.08);
        animation:fadeIn 1s ease;
        }

        /* TITLE */

        h2{
        text-align:center;
        margin-bottom:25px;
        font-weight:600;
        letter-spacing:1px;
        background:linear-gradient(90deg,#ffb300,#ff5e00);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        }

        /* INPUTS */

        label{
        font-size:13px;
        opacity:0.8;
        }

        select,input{
        width:100%;
        padding:12px;
        margin-top:8px;
        margin-bottom:15px;
        border-radius:10px;
        border:none;
        background:#1e1e2f;
        color:white;
        font-size:14px;
        transition:0.3s;
        }

        select:focus,input:focus{
        outline:none;
        box-shadow:0 0 10px #ff9d00;
        }

        /* BUTTON */

        button{
        width:100%;
        padding:14px;
        border:none;
        border-radius:12px;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        background:linear-gradient(90deg,#ff8a00,#ff3d00);
        color:white;
        transition:0.3s;
        }

        button:hover{
        transform:scale(1.05);
        box-shadow:0 0 15px #ff7a00;
        }

        /* RESULT CARD */

        .card{
        background:rgba(255,255,255,0.05);
        border-radius:15px;
        padding:18px;
        margin-top:18px;
        backdrop-filter:blur(10px);
        border:1px solid rgba(255,255,255,0.08);
        transition:0.3s;
        }

        .card:hover{
        transform:translateY(-5px);
        box-shadow:0 10px 20px rgba(0,0,0,0.5);
        }

        /* MAP BUTTON */

        .mapBtn{
        margin-top:10px;
        background:linear-gradient(90deg,#00c6ff,#0072ff);
        font-size:14px;
        }

        .mapBtn:hover{
        box-shadow:0 0 12px #00aaff;
        }

        /* STARS */

        .star{
        font-size:22px;
        }

        .full{
        color:#FFD700;
        }

        .empty{
        color:#555;
        }

        .half{
        background:linear-gradient(90deg,#FFD700 50%,#555 50%);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        }

        /* BADGES */

        .badge1{
        color:#FFD700;
        font-weight:bold;
        margin-bottom:5px;
        }

        .badge2{
        color:#C0C0C0;
        font-weight:bold;
        margin-bottom:5px;
        }

        /* ANIMATION */

        @keyframes fadeIn{

        from{
        opacity:0;
        transform:translateY(20px);
        }

        to{
        opacity:1;
        transform:translateY(0);
        }

        }

    </style>
</head>


<body>

<div class="container">

    <h2>Smart Recommendation</h2>

    <label>City</label>
    <select id="city"></select>

    <label>Type</label>
    <select id="type" onchange="updateCategoryOptions()"></select>

    <label>Category</label>
    <select id="category"></select>

    <button onclick="recommend()">Find Best Places</button>

    <div id="result"></div>

</div>


<script>

    const cities=[
    "Hail",
    "Riyadh",
    "Dammam"
    ];

    const restaurantCategories=[
    "italian restaurant",
    "american restaurant",
    "japanese restaurant",
    "saudi restaurant",
    "shawarma restaurant"
    ];

    const coffeeCategories=[
    "specialty coffee",
    "roastery coffee"
    ];

    function getStars(rating){

    let stars="";

    const full=Math.floor(rating);
    const half=(rating-full)>=0.5;
    const empty=5-full-(half?1:0);

    for(let i=0;i<full;i++)
    stars+='<span class="star full">★</span>';

    if(half)
    stars+='<span class="star half">★</span>';

    for(let i=0;i<empty;i++)
    stars+='<span class="star empty">★</span>';

    return stars;

    }

    function fillCities(){

    const citySelect=document.getElementById("city");

    cities.forEach(city=>{

    const option=document.createElement("option");
    option.value=city;
    option.textContent=city;

    citySelect.appendChild(option);

    });

    }

    function fillTypes(){

    const typeSelect=document.getElementById("type");

    ["restaurant","coffee"].forEach(t=>{

    const option=document.createElement("option");
    option.value=t;
    option.textContent=t;

    typeSelect.appendChild(option);

    });

    }

    function updateCategoryOptions(){

    const type=document.getElementById("type").value;

    const category=document.getElementById("category");
    category.innerHTML="";

    const list=type==="restaurant"?restaurantCategories:coffeeCategories;

    list.forEach(item=>{

    const option=document.createElement("option");

    option.value=item;
    option.textContent=item;

    category.appendChild(option);

    });

    }

    function recommend(){

    const data={

    age:0,
    budget:0,
    city:document.getElementById("city").value,
    type:document.getElementById("type").value,
    category:document.getElementById("category").value,
    language:"en"

    };

    fetch("/recommend",{

    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)

    })

    .then(res=>res.json())
    .then(showResults)

    .catch(()=>{

    document.getElementById("result").innerHTML="<div class='card'>Error loading data</div>";

    });

    }

    function showResults(data){

    const container=document.getElementById("result");

    container.innerHTML="";

    const places=data.places||[];

    places.forEach((p,index)=>{

    const name=p.name;
    const rating=p.rating;
    const reviews=p.reviews;

    const stars=getStars(rating);

    const mapLink="https://www.google.com/maps/search/"+encodeURIComponent(name);

    let badge="";

    if(index===0){
    badge="<p class='badge1'>🏆 Top Recommendation</p>";
    }

    if(index===1){
    badge="<p class='badge2'>🥈 Second Best Choice</p>";
    }

    container.innerHTML+=`

    <div class="card">

    ${badge}

    <h3>${name}</h3>

    <p style="font-size:20px">
    ${stars} (${rating} • ${reviews} reviews)
    </p>

    <a href="${mapLink}" target="_blank">
    <button class="mapBtn">Open in Google Maps</button>
    </a>

    </div>

    `;

    });

    }

    fillCities();
    fillTypes();
    updateCategoryOptions();

</script>

</body>
</html>
```
